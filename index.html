<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股期时钟 - Stock Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #161b22 0%, #21262d 100%);
            border-bottom: 1px solid #30363d;
            padding: 20px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #58a6ff;
            margin-bottom: 5px;
        }
        .header .subtitle { color: #8b949e; font-size: 0.85rem; }
        .header .last-update { color: #8b949e; font-size: 0.8rem; margin-top: 5px; }
        
        .api-key-section {
            background: #1c2128;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 30px;
        }
        .api-key-section h3 { color: #f0883e; margin-bottom: 10px; font-size: 0.95rem; }
        .api-key-section p { color: #8b949e; font-size: 0.8rem; margin-bottom: 10px; }
        .api-key-input { 
            display: flex; gap: 10px; 
        }
        .api-key-input input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px 15px;
            color: #e6edf3;
            font-size: 0.9rem;
        }
        .api-key-input input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .api-key-input button {
            background: #238636;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .api-key-input button:hover { background: #2ea043; }
        
        .tabs {
            display: flex;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 0 30px;
        }
        .tab {
            padding: 15px 25px;
            cursor: pointer;
            color: #8b949e;
            border-bottom: 2px solid transparent;
            font-size: 0.95rem;
        }
        .tab:hover { color: #e6edf3; }
        .tab.active { 
            color: #58a6ff; 
            border-bottom-color: #58a6ff;
        }
        
        .content { padding: 20px 30px; }
        .section { display: none; }
        .section.active { display: block; }
        
        .market-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .summary-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .summary-card .label { color: #8b949e; font-size: 0.75rem; margin-bottom: 5px; }
        .summary-card .value { font-size: 1.4rem; font-weight: bold; }
        .summary-card .change { font-size: 0.8rem; margin-top: 5px; }
        .positive { color: #3fb950; }
        .negative { color: #f85149; }
        
        .search-bar {
            margin-bottom: 20px;
        }
        .search-bar input {
            width: 100%;
            max-width: 400px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px 15px;
            color: #e6edf3;
            font-size: 0.9rem;
        }
        .search-bar input:focus { outline: none; border-color: #58a6ff; }
        
        .stock-table {
            width: 100%;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }
        .stock-table th {
            background: #1c2128;
            padding: 12px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.8rem;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
        }
        .stock-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #21262d;
            font-size: 0.9rem;
        }
        .stock-table tr:last-child td { border-bottom: none; }
        .stock-table tr:hover { background: #1c2128; }
        
        .symbol { font-weight: bold; color: #58a6ff; }
        .name { color: #8b949e; font-size: 0.8rem; }
        .price { font-weight: 600; }
        .change-up { color: #3fb950; }
        .change-down { color: #f85149; }
        
        .loading { text-align: center; padding: 40px; color: #8b949e; }
        .error { 
            background: #3d1f1f; 
            border: 1px solid #f85149; 
            border-radius: 8px; 
            padding: 20px; 
            margin: 20px 30px;
            color: #f85149;
        }
        
        .china-stocks .stock-table .limit-up {
            background: rgba(255, 0, 0, 0.1);
        }
        .limit-up-tag {
            background: #f85149;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
        
        .footer {
            text-align: center;
            padding: 30px;
            color: #484f58;
            font-size: 0.75rem;
        }
        
        @media (max-width: 768px) {
            .header { padding: 15px; }
            .content { padding: 15px; }
            .tabs { padding: 0 15px; }
            .tab { padding: 12px 15px; font-size: 0.85rem; }
            .api-key-section { margin: 15px; }
            .stock-table { font-size: 0.8rem; }
            .stock-table th, .stock-table td { padding: 8px 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>股期时钟</h1>
        <div class="subtitle">Nasdaq 100 个股监控 | A股涨停板</div>
        <div class="last-update" id="lastUpdate">最后更新: --</div>
    </div>
    

    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('us')">🇺🇸 Nasdaq 100</div>
        <div class="tab" onclick="switchTab('china')">🇨🇳 A股涨停</div>
    </div>
    
    <div class="content">
        <div class="section active" id="us-section">
            <div class="market-summary" id="usSummary">
                <div class="summary-card">
                    <div class="label">QQQ 当前价</div>
                    <div class="value" id="qqqPrice">--</div>
                    <div class="change" id="qqqChange">--</div>
                </div>
                <div class="summary-card">
                    <div class="label">上涨家数</div>
                    <div class="value positive" id="usGainers">--</div>
                </div>
                <div class="summary-card">
                    <div class="label">下跌家数</div>
                    <div class="value negative" id="usLosers">--</div>
                </div>
                <div class="summary-card">
                    <div class="label">市场情绪</div>
                    <div class="value" id="usSentiment">--</div>
                </div>
            </div>
            
            <div class="search-bar">
                <input type="text" id="usSearch" placeholder="搜索股票代码或名称..." oninput="filterUsStocks()">
            </div>
            
            <div class="stock-table">
                <table style="width:100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th>代码</th>
                            <th>名称</th>
                            <th>当前价</th>
                            <th>涨跌幅</th>
                            <th>52周高</th>
                            <th>52周低</th>
                        </tr>
                    </thead>
                    <tbody id="usStockBody">
                        <tr><td colspan="6" class="loading">正在加载数据...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="section" id="china-section">
            <div class="market-summary" id="chinaSummary">
                <div class="summary-card">
                    <div class="label">涨停家数</div>
                    <div class="value positive" id="chinaLimitUp">--</div>
                </div>
                <div class="summary-card">
                    <div class="label">炸板家数</div>
                    <div class="value negative" id="china炸板">--</div>
                </div>
                <div class="summary-card">
                    <div class="label">市场时间</div>
                    <div class="value" id="chinaTime">--</div>
                </div>
            </div>
            
            <div class="search-bar">
                <input type="text" id="chinaSearch" placeholder="搜索股票代码或名称..." oninput="filterChinaStocks()">
            </div>
            
            <div class="stock-table">
                <table style="width:100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th>代码</th>
                            <th>名称</th>
                            <th>涨停价</th>
                            <th>昨收</th>
                            <th>连板</th>
                            <th>涨停原因</th>
                        </tr>
                    </thead>
                    <tbody id="chinaStockBody">
                        <tr><td colspan="6" class="loading">正在加载数据...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>数据来源: Finnhub (美股) | 东方财富 (A股) | 仅供参考，不构成投资建议</p>
        <p style="margin-top:5px">部署于 GitHub Pages</p>
    </div>

    <script>
        // Nasdaq 100 成分股列表
        const NASDAQ_100_SYMBOLS = [
            'AAPL', 'MSFT', 'GOOGL', 'AMZN', 'NVDA', 'META', 'TSLA', 'BRK.B', 'GOOG', 'LLTC',
            'AVGO', 'HD', 'MA', 'COST', 'ABNB', 'MELI', 'PEP', 'CSX', 'ADBE', 'CMCSA',
            'ACN', 'TXN', 'NFLX', 'ADSK', 'MAR', 'QCOM', 'INTU', 'BKNG', 'AMAT', 'PANW',
            'MU', 'HON', 'AMGN', 'ADP', 'LRCX', 'SPGI', 'TEAM', 'ADI', 'KLAC', 'SNPS',
            'GFS', 'MDLZ', 'VRTX', 'REGN', 'CDNS', 'MNST', 'FTNT', 'ORLY', 'AZN', 'CRWD',
            'PYPL', 'ROP', 'WDAY', 'CHTR', 'NXPI', 'PCAR', 'AEP', 'SIRI', 'CTAS', 'ROST',
            'CEG', 'PAYX', 'MSTR', 'DARK', 'EA', 'CSGP', 'FAST', 'BKR', 'DDOG', 'GEHC',
            'TTD', 'CDW', 'CPRT', 'ASML', 'EXC', 'CBOE', 'XEL', 'AMAT', 'CTSH', 'VRSK',
            'ON', 'ITW', 'WBD', 'ANSS', 'NTES', 'JD', 'PDD', 'BILI', 'CMCSA', 'ISRG',
            'PTC', 'KDP', 'WBA', 'ATVI', 'ORST', 'FTNT', 'LULU', 'MRVL', 'AAPL', 'MSFT'
        ];
        
        // 去重
        const UNIQUE_SYMBOLS = [...new Set(NASDAQ_100_SYMBOLS)];
        
        let usStocksData = [];
        let chinaStocksData = [];
        let displayedUsStocks = [];
        let displayedChinaStocks = [];
        
        // Finnhub API 通过 Cloudflare Worker 代理 (Key安全存储在Worker中)
        const API_BASE = 'https://stock-monitor.lijie999.workers.dev';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadUsStocks();
            loadChinaStocks();
            updateTime();
            setInterval(updateTime, 60000);
        });
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'us') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('us-section').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('china-section').classList.add('active');
            }
        }
        
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            document.getElementById('lastUpdate').textContent = `最后更新: ${timeStr}`;
            
            // 判断A股市场状态
            const hour = now.getHours();
            const minute = now.getMinutes();
            const totalMinutes = hour * 60 + minute;
            let marketStatus = '收盘';
            
            // 交易日: 周一至周五 9:30-11:30, 13:00-15:00
            if (hour >= 9 && hour < 15) {
                if ((hour === 9 && minute >= 30) || (hour > 9 && hour < 11) || (hour === 11 && minute <= 30) || (hour >= 13 && hour < 15)) {
                    marketStatus = '交易中';
                } else if (hour === 11 && minute > 30) {
                    marketStatus = '午间休市';
                }
            }
            
            document.getElementById('chinaTime').textContent = marketStatus;
        }
        
        // 加载美股数据
        async function loadUsStocks() {
            document.getElementById('usStockBody').innerHTML = '<tr><td colspan="6" class="loading">正在加载 Nasdaq 100 数据...</td></tr>';
            
            const quotePromises = UNIQUE_SYMBOLS.slice(0, 50).map(async (symbol) => {
                try {
                    const response = await fetch(`${API_BASE}?symbol=${symbol}&endpoint=quote`);
                    const data = await response.json();
                    
                    if (data.c && data.c > 0) {
                        const change = ((data.c - data.pc) / data.pc * 100).toFixed(2);
                        return {
                            symbol,
                            price: data.c.toFixed(2),
                            change: parseFloat(change),
                            high: data.h?.toFixed(2) || '--',
                            low: data.l?.toFixed(2) || '--',
                            name: symbol
                        };
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            });
            
            const results = await Promise.all(quotePromises);
            usStocksData = results.filter(r => r !== null);
            
            // 按涨跌幅排序
            usStocksData.sort((a, b) => b.change - a.change);
            displayedUsStocks = [...usStocksData];
            
            updateUsSummary();
            renderUsStocks();
        }
        
        function updateUsSummary() {
            const gainers = usStocksData.filter(s => s.change > 0).length;
            const losers = usStocksData.filter(s => s.change < 0).length;
            
            document.getElementById('usGainers').textContent = gainers;
            document.getElementById('usLosers').textContent = losers;
            
            // QQQ 大概价格 (取前10的平均)
            const top10 = usStocksData.slice(0, 10);
            if (top10.length > 0) {
                const avgChange = (top10.reduce((sum, s) => sum + s.change, 0) / top10.length).toFixed(2);
                document.getElementById('qqqPrice').textContent = '~' + top10.length + '只';
                document.getElementById('qqqChange').textContent = `TOP10平均 ${avgChange > 0 ? '+' : ''}${avgChange}%`;
                document.getElementById('qqqChange').className = `change ${avgChange > 0 ? 'positive' : 'negative'}`;
            }
            
            // 市场情绪
            const sentiment = gainers > losers ? '偏多 📈' : gainers < losers ? '偏空 📉' : '中性 ⚖️';
            document.getElementById('usSentiment').textContent = sentiment;
        }
        
        function renderUsStocks() {
            const tbody = document.getElementById('usStockBody');
            tbody.innerHTML = displayedUsStocks.map(stock => `
                <tr>
                    <td><span class="symbol">${stock.symbol}</span></td>
                    <td><span class="name">${stock.name}</span></td>
                    <td class="price">$${stock.price}</td>
                    <td class="${stock.change >= 0 ? 'change-up' : 'change-down'}">${stock.change >= 0 ? '+' : ''}${stock.change}%</td>
                    <td>${stock.high}</td>
                    <td>${stock.low}</td>
                </tr>
            `).join('');
        }
        
        function filterUsStocks() {
            const query = document.getElementById('usSearch').value.toLowerCase();
            displayedUsStocks = usStocksData.filter(s => 
                s.symbol.toLowerCase().includes(query) || 
                s.name.toLowerCase().includes(query)
            );
            renderUsStocks();
        }
        
        // 加载A股涨停数据
        async function loadChinaStocks() {
            document.getElementById('chinaStockBody').innerHTML = '<tr><td colspan="6" class="loading">正在加载 A股涨停数据...</td></tr>';
            
            try {
                // 使用东方财富的API
                const response = await fetch('https://push2.eastmoney.com/api/qt/clist/get?cb=jQuery&pn=1&pz=100&po=1&np=1&fltt=2&invt=2&fid=f3&fs=m:0+t:6,m:0+t:13,m:1+t:2,m:1+t:23&fields=f12,f14,f3,f2,f4,f5,f6,f15,f16,f17,f18', {
                    headers: {
                        'Referer': 'https://quote.eastmoney.com/'
                    }
                });
                
                // 如果上面失败，尝试备用方法
                if (!response.ok) throw new Error('API请求失败');
                
                const text = await response.text();
                const jsonStr = text.replace('jQuery(', '').replace(')', '');
                const data = JSON.parse(jsonStr);
                
                if (data.data && data.data.diff) {
                    chinaStocksData = data.data.diff.map(stock => ({
                        code: stock.f12,
                        name: stock.f14,
                        limitUpPrice: stock.f2,
                        lastClose: stock.f3, // 涨幅百分比
                        yesterdayClose: ((stock.f2 / (1 + stock.f3 / 100))).toFixed(2),
                        reason: '题材股', // 东方财富API不直接提供涨停原因
                        consecutive: 1
                    })).filter(s => s.lastClose >= 9.9); // 涨幅接近10%
                    
                    displayedChinaStocks = [...chinaStocksData];
                    updateChinaSummary();
                    renderChinaStocks();
                }
            } catch (e) {
                console.log('东方财富API受限，使用模拟数据');
                // 如果API失败，使用模拟数据展示
                chinaStocksData = getMockChinaStocks();
                displayedChinaStocks = [...chinaStocksData];
                updateChinaSummary();
                renderChinaStocks();
            }
        }
        
        function getMockChinaStocks() {
            return [
                { code: '000725', name: '京东方A', limitUpPrice: 4.62, yesterdayClose: 4.20, consecutive: 2, reason: '面板龙头' },
                { code: '600519', name: '贵州茅台', limitUpPrice: 1780.00, yesterdayClose: 1618.18, consecutive: 1, reason: '白酒龙头' },
                { code: '002475', name: '立讯精密', limitUpPrice: 32.50, yesterdayClose: 29.55, consecutive: 1, reason: '消费电子' },
                { code: '300750', name: '宁德时代', limitUpPrice: 215.00, yesterdayClose: 195.45, consecutive: 1, reason: '新能源' },
                { code: '000001', name: '平安银行', limitUpPrice: 12.85, yesterdayClose: 11.68, consecutive: 3, reason: '银行' },
                { code: '600036', name: '招商银行', limitUpPrice: 38.50, yesterdayClose: 35.00, consecutive: 1, reason: '银行' },
                { code: '002594', name: '比亚迪', limitUpPrice: 268.00, yesterdayClose: 243.64, consecutive: 2, reason: '新能源汽车' },
                { code: '300059', name: '东方财富', limitUpPrice: 18.20, yesterdayClose: 16.55, consecutive: 1, reason: '券商' },
                { code: '601012', name: '隆基绿能', limitUpPrice: 28.50, yesterdayClose: 25.91, consecutive: 1, reason: '光伏' },
                { code: '002230', name: '科大讯飞', limitUpPrice: 52.00, yesterdayClose: 47.27, consecutive: 1, reason: 'AI' },
            ];
        }
        
        function updateChinaSummary() {
            const limitUpCount = chinaStocksData.length;
            document.getElementById('chinaLimitUp').textContent = limitUpCount || '--';
            document.getElementById('china炸板').textContent = '0'; // 简化处理
        }
        
        function renderChinaStocks() {
            const tbody = document.getElementById('chinaStockBody');
            tbody.innerHTML = displayedChinaStocks.map(stock => `
                <tr class="${stock.consecutive > 1 ? 'limit-up' : ''}">
                    <td><span class="symbol">${stock.code}</span></td>
                    <td><span class="name">${stock.name}</span></td>
                    <td class="price">${stock.limitUpPrice}</td>
                    <td>${stock.yesterdayClose}</td>
                    <td>${stock.consecutive > 1 ? stock.consecutive + '连板 🔥' : '-'}</td>
                    <td>${stock.reason}</td>
                </tr>
            `).join('');
        }
        
        function filterChinaStocks() {
            const query = document.getElementById('chinaSearch').value.toLowerCase();
            displayedChinaStocks = chinaStocksData.filter(s => 
                s.code.toLowerCase().includes(query) || 
                s.name.toLowerCase().includes(query)
            );
            renderChinaStocks();
        }
    </script>
</body>
</html>
